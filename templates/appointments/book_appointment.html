{% extends 'layouts/dashboard_base.html' %}
{% load static %}

{% block content %}

<div class="dashboard-wrapper">

    {% include 'includes/dashboard_sidebar.html' %}

    <main class="dashboard-content">

        {% include 'includes/dashboard_topbar.html' %}

        <div class="dashboard-header mb-4">

            <h2>
                <i class="fas fa-calendar-plus text-primary mr-2"></i>
                Book Appointment
            </h2>

            <p>
                Schedule your appointment with our specialists.
            </p>

        </div>

        <div class="card shadow border-0 rounded-lg">

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="row">

                        <div class="col-md-6">

                            <div class="form-group">

                                <label>Patient Name</label>

                                <input
                                    type="text"
                                    class="form-control"
                                    name="patient_name"
                                    placeholder="Enter patient name">

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label>Email</label>

                                <input
                                    type="email"
                                    class="form-control"
                                    name="email"
                                    placeholder="Enter email">

                            </div>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="form-group">

                                <label>Doctor</label>

                                <select class="form-control"
                                name="doctor">

                                    <option>Select Doctor</option>

                                    <option>Dr. Raj Sharma</option>

                                    <option>Dr. Priya Singh</option>

                                    <option>Dr. Amit Verma</option>

                                </select>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label>Department</label>

                                <select class="form-control"name="department"
                                >

                                    <option>Select Department</option>

                                    <option>Cardiology</option>

                                    <option>Physiotherapy</option>

                                    

                                    <option>Lab Test or Diagnostics</option>

                                    <option>Neurology</option>

                                    <option>Orthopedics</option>

                                    <option>Health Checkups</option>

                                    <option>General Consultation</option>

                                </select>

                            </div>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="form-group">

                                <label>Appointment Date</label>

                                <input
                                    type="date"
                                    class="form-control" 
                                    name="appointment_date">

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label>Appointment Time</label>

                                <input
                                    type="time"
                                    class="form-control"
                                    name="appointment_time">

                            </div>

                        </div>

                    </div>

                    <div class="form-group">

                        <label>Reason for Visit</label>

                        <textarea
                            rows="3"
                            class="form-control"
                            placeholder="Enter reason"
                            name="reason"></textarea>

                    </div>

                    <div class="form-group">

                        <label>Symptoms</label>

                        <textarea
                            rows="3"
                            class="form-control"
                            placeholder="Describe symptoms"
                            name="symptoms"></textarea>

                    </div>

                    <button
                        class="btn btn-primary btn-lg btn-block">

                        <i class="fas fa-calendar-check mr-2"></i>

                        Book Appointment

                    </button>

                </form>

            </div>

        </div>

    </main>

</div>

{% endblock %}
