<aside class="ccdash-sidebar patient-sidebar">

    <div class="patient-sidebar-header">

        <div class="patient-sidebar-logo">

            <i class="fas fa-hospital-user"></i>

        </div>

        <h3>Citycare</h3>

        <span>Patient Panel</span>

    </div>

    <div class="patient-sidebar-profile">

        <div class="patient-sidebar-avatar">

            <i class="fas fa-user"></i>

        </div>

        <div class="patient-sidebar-info">

            <h5>

                {% if user.first_name %}
                    {{ user.first_name }}
                {% else %}
                    Patient
                {% endif %}

            </h5>

            <small>Patient</small>

        </div>

    </div>

    <ul class="patient-sidebar-menu">

        <li class="active">

            <a href="{% url 'patient_dashboard' %}">

                <i class="fas fa-home"></i>

                <span>Dashboard</span>

            </a>

        </li>

        <li>

            <a href="{% url 'book_appointment' %}">

                <i class="fas fa-calendar-plus"></i>

                <span>Book Appointment</span>

            </a>

        </li>

        <li>

            <a href="{% url 'my_appointments' %}">

                <i class="fas fa-calendar-check"></i>

                <span>My Appointments</span>

            </a>

        </li>

        <li>

            <a href="#">

                <i class="fas fa-file-medical"></i>

                <span>Medical Records</span>

            </a>

        </li>

        <li>

            <a href="{% url 'patient_profile' %}">

                <i class="fas fa-user-circle"></i>

                <span>Profile</span>

            </a>

        </li>

        <li>

            <a href="{% url 'logout' %}">

                <i class="fas fa-sign-out-alt"></i>

                <span>Logout</span>

            </a>

        </li>

    </ul>

</aside>
