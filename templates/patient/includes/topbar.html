<header class="patient-topbar">

    <div class="patient-topbar-left">

        <button class="patient-topbar-menu">

            <i class="fas fa-bars"></i>

        </button>

        <div class="patient-topbar-title">

            <h3>Patient Dashboard</h3>

            <p>

                Welcome,

                {% if user.first_name %}
                    {{ user.first_name }}
                {% else %}
                    Patient
                {% endif %}

            </p>

        </div>

    </div>

    <div class="patient-topbar-right">

        <!-- Search -->

        <div class="patient-search-box">

            <i class="fas fa-search"></i>

            <input
                type="text"
                placeholder="Search appointments...">

        </div>

        <!-- Notification -->

        <div class="patient-notification">

            <i class="fas fa-bell"></i>

            <span class="patient-notification-count">

                0

            </span>

        </div>

        <!-- User -->

        <div class="patient-user-box">

            <div class="patient-user-avatar">

                <i class="fas fa-user"></i>

            </div>

            <div class="patient-user-details">

                <h6>

                    {% if user.first_name %}
                        {{ user.first_name }}
                    {% else %}
                        Patient
                    {% endif %}

                </h6>

                <small>Patient</small>

            </div>

        </div>

    </div>

</header>
