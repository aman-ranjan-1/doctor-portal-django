<div class="dashboard-topbar">

    <!-- Left Section -->
    <div class="topbar-left">

        <h3 class="mb-1">
            Welcome,
            {% if user.first_name %}
                {{ user.first_name }}
            {% else %}
                {{ user.username }}
            {% endif %}
            👋
        </h3>

        <p class="text-muted mb-0">
            Manage your appointments and stay healthy.
        </p>

    </div>

    <!-- Right Section -->
    <div class="topbar-right">

        <!-- Search -->
        <div class="search-box">

            <i class="fas fa-search"></i>

            <input
                type="text"
                placeholder="Search..."
                class="form-control">

        </div>

        <!-- Notification -->

        <a href="#" class="topbar-icon">

            <i class="fas fa-bell"></i>

        </a>

        <!-- Profile -->

        <div class="profile-info">

            <div class="profile-avatar">

                <i class="fas fa-user"></i>

            </div>

            <div class="profile-text">

                <strong>

                    {% if user.first_name %}
                        {{ user.first_name }}
                    {% else %}
                        {{ user.username }}
                    {% endif %}

                </strong>

                <small>Patient</small>

            </div>

        </div>

    </div>

</div>
